    <script>
        (function () {
            var dataLayer = window.dataLayer = window.dataLayer || [];
            function track(event, payload) {
                dataLayer.push(Object.assign({ event: event }, payload || {}));
            }

            var scrollMarks = { p50: false, p90: false };
            var timeMarks = { t10: false, t30: false };

            function onScroll() {
                var h = document.documentElement;
                var scrollTop = h.scrollTop || document.body.scrollTop;
                var max = (h.scrollHeight - h.clientHeight) || 1;
                var p = (scrollTop / max) * 100;
                var bar = document.getElementById('scrollProgress');
                if (bar) bar.style.width = Math.min(100, p) + '%';
                if (!scrollMarks.p50 && p >= 50) {
                    scrollMarks.p50 = true;
                    track('rk_customer_scroll', { depth_percent: 50 });
                }
                if (!scrollMarks.p90 && p >= 90) {
                    scrollMarks.p90 = true;
                    track('rk_customer_scroll', { depth_percent: 90 });
                }
            }
            window.addEventListener('scroll', onScroll, { passive: true });
            onScroll();

            setTimeout(function () {
                if (!timeMarks.t10) { timeMarks.t10 = true; track('rk_customer_engagement', { seconds: 10 }); }
            }, 10000);
            setTimeout(function () {
                if (!timeMarks.t30) { timeMarks.t30 = true; track('rk_customer_engagement', { seconds: 30 }); }
            }, 30000);

            function serviceClick(name) {
                track('rk_customer_cta_click', { cta: name });
                track('rk_customer_service_navigate', { source: name });
            }
            document.getElementById('btnOpenService').addEventListener('click', function () {
                serviceClick('main_open_service');
            });
            document.getElementById('headerServiceLink').addEventListener('click', function () {
                serviceClick('header_open_service');
            });

        })();
    </script>
