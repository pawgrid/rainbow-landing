<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장례 안내 티저 · 상세 섹션</title>
    <meta name="description" content="장례가 처음인 보호자를 위한 짧은 안내 문구입니다.">
    <link rel="canonical" href="https://www.pawgrid.io/intro/">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --surface: #ffffff;
            --ink: #2c2825;
            --muted: #6b6560;
            --line: #e8e4dc;
            --accent: #5c6b5e;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            color: var(--ink);
            line-height: 1.65;
            letter-spacing: -0.02em;
            background: #faf8f5;
            -webkit-font-smoothing: antialiased;
            padding: 1rem;
        }

        .detail-guide-teaser {
            max-width: 28rem;
            margin: 0 auto;
            padding: 0.95rem 1rem 1.05rem;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            text-align: left;
        }

        .detail-guide-teaser-title {
            font-family: "Noto Serif KR", serif;
            font-size: 0.9375rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--ink);
            line-height: 1.35;
            margin: 0 0 0.35rem;
        }

        .detail-guide-teaser-lead {
            font-size: 0.75rem;
            color: var(--muted);
            line-height: 1.5;
            margin: 0 0 0.65rem;
        }

        .detail-guide-teaser-points {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .detail-guide-teaser-points li {
            position: relative;
            padding-left: 0.85rem;
            font-size: 0.8125rem;
            color: var(--ink);
            opacity: 0.92;
            line-height: 1.5;
        }

        .detail-guide-teaser-points li + li {
            margin-top: 0.35rem;
        }

        .detail-guide-teaser-points li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0.45em;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.75;
        }
    </style>
</head>
<body>
    <section class="detail-guide-teaser" aria-labelledby="detail-guide-teaser-title">
        <h2 id="detail-guide-teaser-title" class="detail-guide-teaser-title">장례가 처음이신가요?</h2>
        <p class="detail-guide-teaser-lead">지금은 마음이 먼저예요. 꼭 알아야 할 것만 짧게 적어 두었어요.</p>
        <ul class="detail-guide-teaser-points">
            <li>서두르지 않으셔도 되고, 가족과 작별하신 뒤 연락하셔도 괜찮아요.</li>
            <li>비용은 체중마다 달라요. 무게를 넣으면 같은 기준으로 금액을 비교할 수 있어요.</li>
            <li>집에서는 수건이나 천으로 가볍게 감싸 주시고, 서늘한 곳에 두시는 것만으로도 충분한 경우가 많아요.</li>
        </ul>
    </section>
</body>
</html>
